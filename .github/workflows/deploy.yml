name: Deploy Studio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Studio image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/kirillbaranov/kb-labs-studio:latest
          build-args: |
            VITE_DATA_SOURCE_MODE=mock
            VITE_API_BASE_URL=https://api.kblabs.ru/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u kirillbaranov --password-stdin
            docker pull ghcr.io/kirillbaranov/kb-labs-studio:latest
            docker stop kb-labs-studio || true
            docker rm kb-labs-studio || true
            docker run -d \
              --name kb-labs-studio \
              --restart unless-stopped \
              -p 3002:80 \
              ghcr.io/kirillbaranov/kb-labs-studio:latest
